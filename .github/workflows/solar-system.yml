name: Solar System Workflow

on:
  workflow_dispatch:
  push:
    branches:
     - main
     - 'feature/*'

env:
  MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
  MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
  MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}

jobs:
    unit-testing:
        name: unit-testing
        runs-on: ${{ matrix.operating_system }}
        services:
         mango-db:
          image: siddharth67/mongo-db:non-prod
          ports:
          - 27017:27017
        env:
         MONGO_URI: 'mongodb://localhost:27017/superData'
         MONGO_USERNAME: non-prod-user
         MONGO_PASSWORD: non-prod-password

        strategy:
         matrix:
          nodejs_version: [18, 20]
          operating_system: [ubuntu-latest]
          

        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Node.js ${{ matrix.nodejs_version }}
          uses: actions/setup-node@v3
          with:
           node-version: ${{ matrix.nodejs_version }}

        - name: Cache NPM dependencies
          uses: actions/cache@v5.0.5
          with:
           path: ~/.npm
           key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
        - name: Install Dependencies
          run: npm install
        - name: Run unit testing
          id: nodejs-unit-testing
          run: npm test
        
        - name: Archive Test Result
          if: always()
          uses: actions/upload-artifact@v7
          with:
           name: Mocha-Test-Result
           path: test-results.xml

    code-coverage:
      name: Code Coverage
      
      container:
       image: node:18
      services:
       mongo-db:
         image: siddharth67/mongo-db:non-prod
         options: 
            --name mongo
      env:
        MONGO_URI: 'mongodb://mongo:27017/superData'
        MONGO_USERNAME: non-prod-user
        MONGO_PASSWORD: non-prod-password
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - uses: actions/cache@v3
          name: Cache npm Dependencies
          with:
           path: node_modules
           key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
        - name: Install Dependencies
          run: npm install

        - name: Generate Coverage Report
          continue-on-error: true
          run: npm run coverage

        - name: Archive Coverage Report
          uses: actions/upload-artifact@v7
          with:
                name: Code-Coverage-Result
                path: coverage
                retention-days: 5
    containerization:
       permissions:
        packages: write
       name: docker
       runs-on: ubuntu-latest
       needs: [unit-testing, code-coverage]
       steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Docker Login
          uses: docker/login-action@v2
          with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_PASSWORD }}

        - name: GHCR Login
          uses: docker/login-action@v2
          with:
           registry: ghcr.io
           username: ${{ github.repository_owner }}
           password: ${{ secrets.GITHUB_TOKEN }}


        - name: Build Docker Image for Testing
          uses: docker/build-push-action@v4
          with:
           context: .
           push: false
           tags: ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

        - name: Docker Image Testing
          run: |
            # List built images
            docker images

            # Run the container in detached mode
             docker run --name solar-system-app -d \
              -p 3000:3000 \
              -e MONGO_URI=$MONGO_URI \
              -e MONGO_USERNAME=$MONGO_USERNAME \
              -e MONGO_PASSWORD=$MONGO_PASSWORD \
              ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}

            # Display container IP address
            echo "Container IP:" $(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)

            # Test the /live endpoint
            echo "Testing /live endpoint"
            wget -q -O - http://127.0.0.1:3000/live | grep live

        - name: Build Docker Image for Testing
          uses: docker/build-push-action@v4
          with:
           context: .
           push: true
           tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/solar-system:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/solar-system:${{ github.sha }}












